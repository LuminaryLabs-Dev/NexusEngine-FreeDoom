name: Build and deploy FreeDoom

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  DWASM_COMMIT: ddf0347a4fc115b11ffb1c5710768b7c47c46698
  FREEDOOM_VERSION: 0.13.0
  EXPECTED_PRBOOMX_WAD_SHA256: 506fe7159eaf0a6cb479f866131ec7653638bb08928029cb8dabe1b3b1c9474d

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Check out NexusEngine-FreeDoom
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build unzip libsdl2-dev python3

      - name: Fetch pinned Dwasm source
        run: |
          git clone https://github.com/GMH-Code/Dwasm.git vendor/Dwasm
          git -C vendor/Dwasm checkout "$DWASM_COMMIT"
          test "$(git -C vendor/Dwasm rev-parse HEAD)" = "$DWASM_COMMIT"

      - name: Fetch FreeDoom Phase 2
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/freedoom/freedoom/releases/download/v${FREEDOOM_VERSION}/freedoom-${FREEDOOM_VERSION}.zip" \
            --output freedoom.zip
          unzip -q freedoom.zip -d freedoom-release
          WAD_PATH="$(find freedoom-release -type f -name freedoom2.wad -print -quit)"
          test -n "$WAD_PATH"
          test -s "$WAD_PATH"
          test "$(head -c 4 "$WAD_PATH")" = "IWAD"
          mkdir -p vendor/Dwasm/wasm/fs
          cp "$WAD_PATH" vendor/Dwasm/wasm/fs/freedoom2.wad
          echo "FreeDoom IWAD: $(stat -c %s vendor/Dwasm/wasm/fs/freedoom2.wad) bytes"

      - name: Generate mandatory PrBoom support WAD
        run: |
          cmake \
            -S vendor/Dwasm \
            -B vendor/Dwasm/build-native \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GL=OFF \
            -DBUILD_SERVER=OFF \
            -DWITH_IMAGE=OFF \
            -DWITH_MIXER=OFF \
            -DWITH_NET=OFF \
            -DWITH_PCRE=OFF \
            -DWITH_ZLIB=OFF \
            -DWITH_MAD=OFF \
            -DWITH_FLUIDSYNTH=OFF \
            -DWITH_DUMB=OFF \
            -DWITH_VORBISFILE=OFF \
            -DWITH_PORTMIDI=OFF \
            -DWITH_ALSA=OFF
          cmake --build vendor/Dwasm/build-native --target prboomwad --parallel 2

          SUPPORT_WAD="vendor/Dwasm/build-native/prboomx.wad"
          test -s "$SUPPORT_WAD"
          test "$(head -c 4 "$SUPPORT_WAD")" = "PWAD"
          SUPPORT_BYTES="$(stat -c %s "$SUPPORT_WAD")"
          test "$SUPPORT_BYTES" -gt 400000
          ACTUAL_SHA256="$(sha256sum "$SUPPORT_WAD" | awk '{print $1}')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_PRBOOMX_WAD_SHA256" ]; then
            echo "::warning::Generated prboomx.wad hash differs from the Dwasm README reference: $ACTUAL_SHA256"
          fi
          cp "$SUPPORT_WAD" vendor/Dwasm/wasm/fs/prboomx.wad
          echo "PrBoom support WAD: $SUPPORT_BYTES bytes, sha256=$ACTUAL_SHA256"

      - name: Apply NexusEngine browser shell
        run: cp web/shell.html vendor/Dwasm/wasm/shell.html

      - name: Configure explicit embedded files
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("vendor/Dwasm/CMakeLists.txt")
          text = path.read_text()
          text = text.replace(
              "--shell-file ../../wasm/shell.html",
              "--shell-file ../wasm/shell.html",
          )
          text = text.replace(
              "--embed-file=../../wasm/fs/@/",
              "--embed-file=../wasm/fs/freedoom2.wad@/freedoom2.wad "
              "--embed-file=../wasm/fs/prboomx.wad@/prboomx.wad",
          )
          path.write_text(text)
          PY

          grep -q -- '--shell-file ../wasm/shell.html' vendor/Dwasm/CMakeLists.txt
          grep -q -- '--embed-file=../wasm/fs/freedoom2.wad@/freedoom2.wad' vendor/Dwasm/CMakeLists.txt
          grep -q -- '--embed-file=../wasm/fs/prboomx.wad@/prboomx.wad' vendor/Dwasm/CMakeLists.txt
          test -s vendor/Dwasm/wasm/shell.html
          test -s vendor/Dwasm/wasm/fs/freedoom2.wad
          test -s vendor/Dwasm/wasm/fs/prboomx.wad
          find vendor/Dwasm/wasm/fs -maxdepth 2 -type f -printf '%p %s bytes\n' | sort

      - name: Compile Dwasm to a single HTML file
        run: |
          emcmake cmake \
            -S vendor/Dwasm \
            -B vendor/Dwasm/build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GL=OFF \
            -DBUILD_SERVER=OFF \
            -DSINGLE_HTML_FILE=ON
          cmake --build vendor/Dwasm/build --target index --parallel 2

      - name: Assemble Pages artifact
        run: |
          mkdir -p dist/licenses
          cp vendor/Dwasm/build/index.html dist/index.html
          touch dist/.nojekyll
          cp vendor/Dwasm/COPYING dist/licenses/DWASM-GPL-2.0.txt

          FREEDOOM_LICENSE="$(find freedoom-release -maxdepth 3 -type f \( -iname copying -o -iname copying.txt -o -iname license -o -iname license.txt \) -print -quit)"
          if [ -n "$FREEDOOM_LICENSE" ]; then
            cp "$FREEDOOM_LICENSE" dist/licenses/FREEDOOM-LICENSE.txt
          else
            printf '%s\n' \
              'FreeDoom 0.13.0 content. See https://github.com/freedoom/freedoom for license and source.' \
              > dist/licenses/FREEDOOM-LICENSE.txt
          fi

          printf '%s\n' \
            "Build commit: $GITHUB_SHA" \
            'Runtime source: https://github.com/GMH-Code/Dwasm' \
            "Runtime commit: $DWASM_COMMIT" \
            'Content source: https://github.com/freedoom/freedoom' \
            "Content release: $FREEDOOM_VERSION" \
            > dist/licenses/SOURCES.txt

      - name: Validate generated artifact
        run: |
          test -s dist/index.html
          grep -q 'NexusEngine FreeDoom' dist/index.html
          grep -q 'freedoom2.wad@/freedoom2.wad' vendor/Dwasm/CMakeLists.txt
          grep -q 'prboomx.wad@/prboomx.wad' vendor/Dwasm/CMakeLists.txt
          BYTES="$(wc -c < dist/index.html)"
          test "$BYTES" -gt 10000000
          echo "Single-file artifact: $BYTES bytes"

      - name: Install Chromium
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify both WADs and first playable frame
        run: |
          python3 -m http.server 4173 --directory dist > /tmp/freedoom-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              break
            fi
            sleep 1
          done

          node scripts/smoke-free-doom.cjs http://127.0.0.1:4173/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed artifact
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          test -n "$PAGE_URL"
          curl --fail --location \
            --retry 12 \
            --retry-delay 10 \
            --retry-all-errors \
            "$PAGE_URL?build=${GITHUB_SHA}" \
            --output deployed.html
          test -s deployed.html
          grep -q 'NexusEngine FreeDoom' deployed.html
          BYTES="$(wc -c < deployed.html)"
          test "$BYTES" -gt 10000000
          echo "Deployed artifact: $PAGE_URL ($BYTES bytes)"
